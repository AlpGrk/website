<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Todo List</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      color: #333;
      min-height: 100vh;
      padding: 24px 16px;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      text-align: center;
      margin-bottom: 24px;
      color: #111;
    }

    .add-form {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .add-form input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 1rem;
      background: #fff;
      outline: none;
      transition: border-color 0.15s;
    }

    .add-form input:focus {
      border-color: #4a90e2;
    }

    .btn {
      padding: 10px 18px;
      border: none;
      border-radius: 6px;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }

    .btn-primary {
      background: #4a90e2;
      color: #fff;
    }

    .btn-primary:hover {
      background: #357abd;
    }

    .btn-secondary {
      background: #e8e8e8;
      color: #555;
    }

    .btn-secondary:hover {
      background: #d4d4d4;
    }

    .btn-danger {
      background: #e8e8e8;
      color: #c0392b;
    }

    .btn-danger:hover {
      background: #fde8e8;
    }

    .btn-sm {
      padding: 5px 10px;
      font-size: 0.8rem;
    }

    .filters {
      display: flex;
      gap: 6px;
      margin-bottom: 16px;
    }

    .filter-btn {
      padding: 6px 14px;
      border: 1px solid #ddd;
      border-radius: 20px;
      font-size: 0.85rem;
      cursor: pointer;
      background: #fff;
      color: #555;
      transition: all 0.15s;
    }

    .filter-btn.active {
      background: #4a90e2;
      border-color: #4a90e2;
      color: #fff;
    }

    .filter-btn:hover:not(.active) {
      background: #f0f0f0;
    }

    .task-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .task-item {
      background: #fff;
      border: 1px solid #e8e8e8;
      border-radius: 8px;
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .task-item.completed .task-title {
      text-decoration: line-through;
      color: #aaa;
    }

    .task-checkbox {
      width: 18px;
      height: 18px;
      cursor: pointer;
      flex-shrink: 0;
      accent-color: #4a90e2;
    }

    .task-title {
      flex: 1;
      font-size: 1rem;
      word-break: break-word;
    }

    .task-actions {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }

    .task-edit-form {
      flex: 1;
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .task-edit-input {
      flex: 1;
      padding: 6px 10px;
      border: 1px solid #4a90e2;
      border-radius: 5px;
      font-size: 1rem;
      outline: none;
    }

    .empty-msg {
      text-align: center;
      color: #aaa;
      font-size: 0.95rem;
      padding: 32px 0;
    }

    @media (max-width: 480px) {
      h1 {
        font-size: 1.4rem;
      }

      .add-form {
        flex-direction: column;
      }

      .add-form input {
        width: 100%;
      }

      .task-actions {
        flex-direction: column;
        gap: 4px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>My Todo List</h1>

    <div class="add-form">
      <input
        type="text"
        id="new-task-input"
        placeholder="Add a new task..."
        aria-label="New task title"
      >
      <button class="btn btn-primary" id="add-btn">Add</button>
    </div>

    <div class="filters">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="active">Active</button>
      <button class="filter-btn" data-filter="completed">Completed</button>
    </div>

    <ul class="task-list" id="task-list"></ul>
    <p class="empty-msg" id="empty-msg" style="display:none;">No tasks here.</p>
  </div>

  <script>
    const STORAGE_KEY = 'mytodolist_tasks';
    let tasks = [];
    let currentFilter = 'all';

    function loadTasks() {
      try {
        tasks = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
      } catch {
        tasks = [];
      }
    }

    function saveTasks() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
    }

    function generateId() {
      return Date.now().toString(36) + Math.random().toString(36).slice(2);
    }

    function addTask(title) {
      const trimmed = title.trim();
      if (!trimmed) return;
      tasks.push({ id: generateId(), title: trimmed, completed: false, createdAt: new Date().toISOString() });
      saveTasks();
      render();
    }

    function toggleTask(id) {
      const task = tasks.find(t => t.id === id);
      if (task) {
        task.completed = !task.completed;
        saveTasks();
        render();
      }
    }

    function deleteTask(id) {
      tasks = tasks.filter(t => t.id !== id);
      saveTasks();
      render();
    }

    function saveEdit(id, newTitle) {
      const trimmed = newTitle.trim();
      if (!trimmed) return;
      const task = tasks.find(t => t.id === id);
      if (task) {
        task.title = trimmed;
        saveTasks();
        render();
      }
    }

    function filteredTasks() {
      if (currentFilter === 'active') return tasks.filter(t => !t.completed);
      if (currentFilter === 'completed') return tasks.filter(t => t.completed);
      return tasks;
    }

    function renderTaskItem(task) {
      const li = document.createElement('li');
      li.className = 'task-item' + (task.completed ? ' completed' : '');
      li.dataset.id = task.id;

      const checkbox = document.createElement('input');
      checkbox.type = 'checkbox';
      checkbox.className = 'task-checkbox';
      checkbox.checked = task.completed;
      checkbox.setAttribute('aria-label', 'Mark task complete');
      checkbox.addEventListener('change', () => toggleTask(task.id));

      const titleSpan = document.createElement('span');
      titleSpan.className = 'task-title';
      titleSpan.textContent = task.title;

      const actions = document.createElement('div');
      actions.className = 'task-actions';

      const editBtn = document.createElement('button');
      editBtn.className = 'btn btn-secondary btn-sm';
      editBtn.textContent = 'Edit';
      editBtn.addEventListener('click', () => enterEditMode(li, task));

      const deleteBtn = document.createElement('button');
      deleteBtn.className = 'btn btn-danger btn-sm';
      deleteBtn.textContent = 'Delete';
      deleteBtn.addEventListener('click', () => deleteTask(task.id));

      actions.appendChild(editBtn);
      actions.appendChild(deleteBtn);

      li.appendChild(checkbox);
      li.appendChild(titleSpan);
      li.appendChild(actions);

      return li;
    }

    function enterEditMode(li, task) {
      li.innerHTML = '';

      const checkbox = document.createElement('input');
      checkbox.type = 'checkbox';
      checkbox.className = 'task-checkbox';
      checkbox.checked = task.completed;
      checkbox.setAttribute('aria-label', 'Mark task complete');
      checkbox.addEventListener('change', () => toggleTask(task.id));

      const editForm = document.createElement('div');
      editForm.className = 'task-edit-form';

      const editInput = document.createElement('input');
      editInput.type = 'text';
      editInput.className = 'task-edit-input';
      editInput.value = task.title;
      editInput.setAttribute('aria-label', 'Edit task title');

      const saveBtn = document.createElement('button');
      saveBtn.className = 'btn btn-primary btn-sm';
      saveBtn.textContent = 'Save';

      const cancelBtn = document.createElement('button');
      cancelBtn.className = 'btn btn-secondary btn-sm';
      cancelBtn.textContent = 'Cancel';

      const doSave = () => {
        const val = editInput.value;
        if (val.trim()) saveEdit(task.id, val);
        else render();
      };

      const doCancel = () => render();

      saveBtn.addEventListener('click', doSave);
      cancelBtn.addEventListener('click', doCancel);
      editInput.addEventListener('keydown', e => {
        if (e.key === 'Enter') doSave();
        if (e.key === 'Escape') doCancel();
      });

      editForm.appendChild(editInput);
      editForm.appendChild(saveBtn);
      editForm.appendChild(cancelBtn);

      li.appendChild(checkbox);
      li.appendChild(editForm);

      editInput.focus();
      editInput.select();
    }

    function render() {
      const list = document.getElementById('task-list');
      const emptyMsg = document.getElementById('empty-msg');
      const visible = filteredTasks();

      list.innerHTML = '';
      visible.forEach(task => list.appendChild(renderTaskItem(task)));

      emptyMsg.style.display = visible.length === 0 ? 'block' : 'none';
    }

    // Add task handlers
    const input = document.getElementById('new-task-input');
    const addBtn = document.getElementById('add-btn');

    addBtn.addEventListener('click', () => {
      addTask(input.value);
      input.value = '';
      input.focus();
    });

    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        addTask(input.value);
        input.value = '';
      }
    });

    // Filter handlers
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        currentFilter = btn.dataset.filter;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render();
      });
    });

    // Init
    loadTasks();
    render();
  </script>
</body>
</html>
